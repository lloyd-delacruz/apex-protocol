version: '3.8'

# Apex Protocol — local development services
#
# Starts:
#   - PostgreSQL 16 on port 5432 (the only external dependency)
#
# Usage:
#   docker-compose up -d        # start postgres in background
#   docker-compose down         # stop and remove containers
#   docker-compose down -v      # also delete the database volume

services:
  db:
    image: postgres:16-alpine
    container_name: apex_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: apex_protocol
    ports:
      - '5432:5432'
    volumes:
      - apex_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  apex_db_data:
    name: apex_db_data
